<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Microsoft Workflow Tools</title>
    <style>
      html, body, #app {
        background: transparent !important;
      }
      :root {
        --colorNeutralBackground1: #FFFFFF;
        --colorNeutralBackground2: #F5F5F5;
        --colorNeutralForeground1: #242424;
        --colorNeutralForeground2: #484848;
        --colorNeutralForeground3: #6F6F6F;
        --colorNeutralStroke1: #C7C7C7;
        --colorNeutralStroke2: #DEDEDE;

        --colorBrandBackground: #4858EB;
        --colorBrandForeground1: #4858EB;
        --colorBrandStroke1: #4858EB;

        --colorSubtleBackground: transparent;
        --colorSubtleBackgroundHover: #F5F5F5;
        --colorSubtleBackgroundPressed: #E0E0E0;
        --colorStrokeFocus2: #000000;

        --borderRadiusMedium: 12px;
        --borderRadiusSmall: 2px;
        --elevateRadiusCompact: 8px;

        --fontFamilyBase: 'Segoe UI Variable', 'Segoe UI Variable Text', 'Segoe UI Variable Display', 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, 'Helvetica Neue', sans-serif;
        --fontSizeBase200: 12px;
        --fontSizeBase300: 14px;
        --fontSizeBase400: 16px;
        --fontWeightRegular: 400;
        --fontWeightSemibold: 600;
        --lineHeightBase200: 16px;
        --lineHeightBase300: 20px;

        --spacingHorizontalS: 8px;
        --spacingHorizontalM: 12px;
        --spacingHorizontalL: 16px;
        --spacingHorizontalXL: 20px;
        --spacingVerticalS: 8px;
        --spacingVerticalM: 12px;
        --spacingVerticalL: 16px;
        --spacingVerticalXL: 20px;

        --durationFaster: 100ms;
        --durationFast: 150ms;
        --curveEasyEase: cubic-bezier(0.33,0,0.67,1);

        --shadow16: 0 6px 24px rgba(0,0,0,0.20);
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script src="app.js"></script>
  </body>
</html>
